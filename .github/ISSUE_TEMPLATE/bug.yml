name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Use synthetic or redacted traces only.
  - type: input
    id: version
    attributes:
      label: TraceForge version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Input format
      options: [OTLP JSON, flat JSON, JSONL, built-in demo, other]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, minimal redacted input, expected result, and actual result.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, installation method"
