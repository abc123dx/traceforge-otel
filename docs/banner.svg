<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">TraceForge</title>
  <desc id="desc">A dark technical banner showing a glowing OpenTelemetry trace becoming actionable signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b12"/>
      <stop offset=".55" stop-color="#101827"/>
      <stop offset="1" stop-color="#071b1c"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f8ff"/>
      <stop offset=".58" stop-color="#dcecff"/>
      <stop offset="1" stop-color="#6fffc1"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#49d9ff"/>
      <stop offset="1" stop-color="#6fffc1"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#49d9ff" stop-opacity=".3"/>
      <stop offset="1" stop-color="#49d9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#72809b" stroke-opacity=".065"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <circle cx="970" cy="110" r="260" fill="url(#glow)" filter="url(#blur)"/>
  <path d="M732 174H812L856 107H929L968 151H1073" fill="none" stroke="#25354a" stroke-width="18" stroke-linecap="round"/>
  <path d="M732 174H812L856 107H929L968 151H1073" fill="none" stroke="url(#trace)" stroke-width="3" stroke-linecap="round"/>
  <path d="M812 174L855 247H933L974 210H1091" fill="none" stroke="#25354a" stroke-width="18" stroke-linecap="round"/>
  <path d="M812 174L855 247H933L974 210H1091" fill="none" stroke="url(#trace)" stroke-width="3" stroke-linecap="round"/>
  <g filter="url(#nodeGlow)">
    <circle cx="732" cy="174" r="8" fill="#49d9ff"/>
    <circle cx="856" cy="107" r="8" fill="#49d9ff"/>
    <circle cx="968" cy="151" r="8" fill="#6fffc1"/>
    <circle cx="855" cy="247" r="8" fill="#ffd166"/>
    <circle cx="974" cy="210" r="8" fill="#6fffc1"/>
  </g>
  <g fill="#94a3bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1">
    <text x="839" y="82">MODEL · 700 ms</text>
    <text x="831" y="276">TOOL · RETRY ×2</text>
    <text x="978" y="131">TOKENS</text>
    <text x="985" y="237">COST</text>
  </g>
  <g transform="translate(68 72)">
    <rect width="54" height="54" rx="14" fill="#101e2c" stroke="#36506a"/>
    <path d="M13 29H22L27 18L33 37L39 25H44" fill="none" stroke="url(#trace)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="68" y="190" fill="url(#word)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="76" font-weight="760" letter-spacing="-4">TraceForge</text>
  <text x="72" y="228" fill="#94a3bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="3">AGENT TRACE INTELLIGENCE</text>
  <text x="72" y="284" fill="#c7d3e8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">Latency · critical path · tools · retries · tokens · cost</text>
  <rect x=".75" y=".75" width="1198.5" height="358.5" rx="27.25" fill="none" stroke="#31405a" stroke-width="1.5"/>
</svg>
